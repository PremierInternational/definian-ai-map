  <script>window.__EXTRA_FIELDS__=[{"key":"aiType","label":"AI Type","type":"select","options":["—","Gen AI","Agentic AI","ML","NLP","Computer Vision","Rule-Based"],"icon":"🧠","defaultValue":"—"},{"key":"trainingRequired","label":"Training/Context Req.","type":"select","options":["—","Yes – Training","Yes – Context","No"],"icon":"🎓","defaultValue":"—"}];</script>
  <script>window.__NODE_TYPE_CONFIG__={"Application":{"icon":"🏗️","color":"#4a90d9"},"Feature":{"icon":"⚙️","color":"#a78bfa"},"Module":{"icon":"📦","color":"#f59e0b"},"Integration":{"icon":"🔗","color":"#e879a0"},"AI Agent":{"icon":"🤖","color":"#00AB63"}};</script>
  <script type="text/babel">
    const{useState,useMemo,useEffect}=React;
    const BRAND={blue:"#0D2C71",green:"#00AB63",midnight:"#02072D",darkGray:"#3C405B",coolGray:"#D8D7EE",white:"#FFFFFF",blueLight:"#1a3d8f",greenDark:"#008a4f",midnightLight:"#0a1240"};
    const STATUS_CONFIG={"Completed":{bg:"#003d24",text:"#00AB63",dot:"#00AB63",border:"#00AB63"},"In Progress":{bg:"#2a1e00",text:"#f5c842",dot:"#f5c842",border:"#f5c842"},"Not Started":{bg:"#1e2035",text:"#D8D7EE",dot:"#6b7280",border:"#3C405B"}};
    const BUILD_CONFIG={"Local LLM API":{icon:"🖥️",color:"#7c6af5"},"Claude Project":{icon:"🔷",color:"#00AB63"},"Web LLM API":{icon:"🌐",color:"#4a90d9"},"—":{icon:"",color:"transparent"}};
    const NODE_TYPE_CONFIG=window.__NODE_TYPE_CONFIG__;
    const EXTRA_FIELDS=window.__EXTRA_FIELDS__;
    let nextId=200;
    const makeId=()=>`node_${nextId++}`;
    const BLANK={name:"",description:"",status:"Not Started",owner:"",nodeType:"AI Agent",model:"",buildType:"—",githubRepo:"",...Object.fromEntries(EXTRA_FIELDS.map(f=>[f.key,f.defaultValue])),children:[]};

    function updateNode(t,id,u){if(t.id===id)return{...t,...u};return{...t,children:t.children.map(c=>updateNode(c,id,u))};}
    function deleteNode(t,id){return{...t,children:t.children.filter(c=>c.id!==id).map(c=>deleteNode(c,id))};}
    function addChild(t,pid,child){if(t.id===pid)return{...t,children:[...t.children,child]};return{...t,children:t.children.map(c=>addChild(c,pid,child))};}
    function moveChild(t,id,dir){const i=t.children.findIndex(c=>c.id===id);if(i!==-1){const ni=dir==="up"?i-1:i+1;if(ni<0||ni>=t.children.length)return t;const ch=[...t.children];[ch[i],ch[ni]]=[ch[ni],ch[i]];return{...t,children:ch};}return{...t,children:t.children.map(c=>moveChild(c,id,dir))};}
    function getAllNodes(n,a=[]){a.push(n);n.children?.forEach(c=>getAllNodes(c,a));return a;}
    function getAllOwners(n,s=new Set()){if(n.owner&&n.owner!=="\u2014")s.add(n.owner);n.children?.forEach(c=>getAllOwners(c,s));return s;}

    const iS={background:"#0a1240",border:"1px solid #3C405B",borderRadius:6,padding:"5px 9px",fontSize:12,color:"#FFFFFF",outline:"none",width:160};
    const sS={...iS,width:"auto",minWidth:140,cursor:"pointer"};

    function Field({label,children}){
      return(
        <label style={{display:"flex",flexDirection:"column",gap:3,fontSize:11,color:"#D8D7EE"}}>
          <span style={{textTransform:"uppercase",letterSpacing:"0.06em",fontSize:10,color:"#00AB63"}}>{label}</span>
          {children}
        </label>
      );
    }

    function Btn({onClick,primary,children}){
      const[h,sH]=useState(false);
      return(
        <button onClick={onClick} onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)}
          style={{background:primary?(h?"#008a4f":"#00AB63"):(h?"#3C405B":"#1e2240"),
            color:primary?"#02072D":"#D8D7EE",border:"none",borderRadius:7,
            padding:"6px 16px",fontSize:12,cursor:"pointer",fontWeight:700,transition:"background 0.15s"}}>
          {children}
        </button>
      );
    }

    function ActionBtn({onClick,title,danger,disabled,children}){
      const[h,sH]=useState(false);
      return(
        <button onClick={onClick} title={title} disabled={disabled}
          onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)}
          style={{background:h&&!disabled?(danger?"#3d0a0a":"#3C405B"):"transparent",
            border:`1px solid ${danger?"#7f1d1d":"#3C405B"}`,borderRadius:6,
            padding:"2px 7px",fontSize:12,cursor:disabled?"default":"pointer",
            color:disabled?"#3C405B":(danger?"#f87171":"#D8D7EE"),
            transition:"background 0.15s",opacity:disabled?0.4:1}}>
          {children}
        </button>
      );
    }

    function NodeCard({node,depth,filters,onEdit,onDelete,onAddChild,onMove,siblingIndex,siblingCount,isRoot}){
      const[expanded,setExpanded]=useState(depth<1);
      const[editing,setEditing]=useState(false);
      const[adding,setAdding]=useState(false);
      const[form,setForm]=useState({...node});
      const[newNode,setNewNode]=useState({...BLANK});
      const hasChildren=node.children?.length>0;
      const sc=STATUS_CONFIG[node.status]||STATUS_CONFIG["Not Started"];
      const bc=BUILD_CONFIG[node.buildType]||BUILD_CONFIG["\u2014"];
      const ntc=NODE_TYPE_CONFIG[node.nodeType]||NODE_TYPE_CONFIG["AI Agent"];
      const depthAccent=depth===0?BRAND.green:depth===1?BRAND.blue:BRAND.darkGray;
      const headerBg=depth===0?BRAND.midnightLight:depth===1?"#071040":"#0d1535";
      const editIsAgent=(form.nodeType||"AI Agent")==="AI Agent";
      const newIsAgent=(newNode.nodeType||"AI Agent")==="AI Agent";
      const editIsAppOrFeature=["Application","Feature"].includes(form.nodeType);
      const newIsAppOrFeature=["Application","Feature"].includes(newNode.nodeType);

      function npf(n){
        const sp=(!filters.status||n.status===filters.status)&&(!filters.owner||n.owner===filters.owner)&&(!filters.buildType||n.buildType===filters.buildType)&&(!filters.nodeType||(n.nodeType||"AI Agent")===filters.nodeType);
        if(!n.children||n.children.length===0)return sp;
        return sp||n.children.some(c=>npf(c));
      }
      if(!npf(node))return null;

      function saveEdit(){onEdit(node.id,form);setEditing(false);}
      function saveNew(){
        if(!newNode.name.trim())return;
        onAddChild(node.id,{...newNode,id:makeId()});
        setNewNode({...BLANK});setAdding(false);setExpanded(true);
      }

      const isFirst=siblingIndex===0;
      const isLast=siblingIndex===siblingCount-1;

      return(
        <div style={{marginLeft:depth===0?0:20,marginTop:8}}>
          <div style={{border:`1.5px solid ${depthAccent}`,borderRadius:10,background:BRAND.midnightLight,boxShadow:"0 2px 16px rgba(0,0,0,0.4)",overflow:"hidden"}}>

            {/* Header */}
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"11px 14px",background:headerBg,cursor:hasChildren?"pointer":"default",userSelect:"none"}}
              onClick={()=>hasChildren&&setExpanded(e=>!e)}>
              {hasChildren&&<span style={{fontSize:13,color:depthAccent,minWidth:14}}>{expanded?"▾":"▸"}</span>}
              <span style={{fontSize:14,lineHeight:1}}>{ntc.icon}</span>
              <span style={{fontFamily:"'Titillium Web',sans-serif",fontWeight:700,fontSize:depth===0?17:14,color:BRAND.white,flex:1}}>{node.name}</span>
              <span style={{color:ntc.color,border:`1px solid ${ntc.color}44`,borderRadius:99,padding:"2px 8px",fontSize:10,fontWeight:700,whiteSpace:"nowrap",background:`${ntc.color}12`}}>
                {node.nodeType||"AI Agent"}
              </span>
              <span style={{background:sc.bg,color:sc.text,border:`1px solid ${sc.border}44`,borderRadius:99,padding:"2px 10px",fontSize:11,fontWeight:600,display:"inline-flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:sc.dot}}/>{node.status}
              </span>
              <div style={{display:"flex",gap:4}} onClick={e=>e.stopPropagation()}>
                {!isRoot&&(
                  <>
                    <ActionBtn onClick={()=>onMove(node.id,"up")} title="Move up" disabled={isFirst}>↑</ActionBtn>
                    <ActionBtn onClick={()=>onMove(node.id,"down")} title="Move down" disabled={isLast}>↓</ActionBtn>
                  </>
                )}
                <ActionBtn onClick={()=>{setEditing(e=>!e);setForm({...node});}} title="Edit">✏️</ActionBtn>
                <ActionBtn onClick={()=>setAdding(a=>!a)} title="Add child">＋</ActionBtn>
                {!isRoot&&<ActionBtn onClick={()=>{if(window.confirm(`Delete "${node.name}" and all its children?`))onDelete(node.id);}} title="Delete" danger>🗑</ActionBtn>}
              </div>
            </div>

            {/* Display view */}
            {!editing&&(
              <div style={{padding:"8px 14px 10px",fontSize:12,color:BRAND.coolGray,display:"flex",flexWrap:"wrap",gap:"5px 18px"}}>
                <span style={{color:"#a0a9c8"}}>📝 {node.description}</span>
                <span>👤 <b style={{color:BRAND.white}}>{node.owner}</b></span>
                {node.model!=="\u2014"&&node.model&&<span>🤖 <b style={{color:BRAND.white}}>{node.model}</b></span>}
                {node.buildType!=="\u2014"&&node.buildType&&<span style={{color:bc.color}}>{bc.icon} <b>{node.buildType}</b></span>}
                {EXTRA_FIELDS.map(f=>{const val=node[f.key];if(!val||val==="\u2014")return null;return<span key={f.key}>{f.icon} <b style={{color:BRAND.white}}>{val}</b></span>;})}

                  ＋ Add child to "{node.name}"
                </div>
                <Field label="Name *"><input style={iS} value={newNode.name} onChange={e=>setNewNode(f=>({...f,name:e.target.value}))} placeholder="Node name"/></Field>
                <Field label="Node Type">
                  <select style={sS} value={newNode.nodeType||"AI Agent"} onChange={e=>setNewNode(f=>({...f,nodeType:e.target.value}))}>
                    {Object.keys(NODE_TYPE_CONFIG).map(t=><option key={t}>{t}</option>)}
                  </select>
                </Field>
                <Field label="Description"><input style={{...iS,width:220}} value={newNode.description} onChange={e=>setNewNode(f=>({...f,description:e.target.value}))} placeholder="What does it do?"/></Field>
                <Field label="Owner"><input style={iS} value={newNode.owner} onChange={e=>setNewNode(f=>({...f,owner:e.target.value}))} placeholder="Name or team"/></Field>
                <Field label="Status">

                {newIsAgent&&(
                  <>
                    <Field label="Model"><input style={iS} value={newNode.model} onChange={e=>setNewNode(f=>({...f,model:e.target.value}))} placeholder="e.g. GPT-4o"/></Field>
                    <Field label="Build Type">
                      <select style={sS} value={newNode.buildType} onChange={e=>setNewNode(f=>({...f,buildType:e.target.value}))}>

            <div style={{fontSize:10,color:"#00AB63",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Current page URL</div>

              {url}

            <div style={{background:"#040d2a",border:"1px solid #3C405B",borderRadius:8,padding:"12px 14px",marginBottom:16,fontFamily:"monospace",fontSize:11,color:"#D8D7EE",wordBreak:"break-all",lineHeight:1.6}}>
              {iframeCode}

                style={{background:copied?"#00AB63":"transparent",border:`1.5px solid #00AB63`,color:copied?"#02072D":"#00AB63",borderRadius:8,padding:"8px 20px",fontSize:12,fontWeight:700,cursor:"pointer",transition:"all 0.2s"}}>

    function App(){
      const[data,setData]=useState(()=>{try{const s=localStorage.getItem('def-ai-map');return s?JSON.parse(s):window.__INITIAL_DATA__;}catch(e){return window.__INITIAL_DATA__;}});
      const[filters,setFilters]=useState({status:"",owner:"",buildType:"",nodeType:""});
      const[exported,setExported]=useState(false);
      const[showEmbed,setShowEmbed]=useState(false);
      const[pushState,setPushState]=useState("idle");
      const[pushError,setPushError]=useState("");
      const[refreshState,setRefreshState]=useState("idle");
      const[showSettings,setShowSettings]=useState(false);
      const[pat,setPat]=useState(()=>localStorage.getItem('def-ai-map-pat')||"");
      const[logs,setLogs]=useState([]);
      useEffect(()=>{try{localStorage.setItem('def-ai-map',JSON.stringify(data));}catch(e){}},[data]);
      function addLog(msg,level="info"){const t=new Date().toLocaleTimeString();setLogs(l=>[{t,msg,level},...l].slice(0,50));}

      function handleEdit(id,u){setData(d=>updateNode(d,id,u));}
      function handleDelete(id){setData(d=>deleteNode(d,id));}
      function handleAddChild(pid,child){setData(d=>addChild(d,pid,child));}
      function handleMove(id,dir){setData(d=>moveChild(d,id,dir));}

      const allNodes=useMemo(()=>getAllNodes(data),[data]);
      const owners=useMemo(()=>[...getAllOwners(data)].sort(),[data]);
      const counts=useMemo(()=>{
        const c={"Completed":0,"In Progress":0,"Not Started":0};
        allNodes.forEach(n=>{if(c[n.status]!==undefined)c[n.status]++;});
        return c;
      },[allNodes]);
      const typeCounts=useMemo(()=>{
        const c={};
        allNodes.forEach(n=>{const t=n.nodeType||"AI Agent";c[t]=(c[t]||0)+1;});
        return c;
      },[allNodes]);

      const anyFilter=filters.status||filters.owner||filters.buildType||filters.nodeType;

      function buildHTML(){
        const json=JSON.stringify(data,null,2);
        const efJson=JSON.stringify(EXTRA_FIELDS);
        const ntJson=JSON.stringify(NODE_TYPE_CONFIG);
        const scriptSrc=document.querySelector('script[type="text/babel"]').textContent;
        return `<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8"/>\n  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>\n  <title>Data Platform \u00b7 AI Integration Map<\/title>\n  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>\n  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"><\/script>\n  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"><\/script>\n  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"><\/script>\n  <style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#02072D;font-family:'Roboto',sans-serif;min-height:100vh;padding:28px;}select,input,button{font-family:'Roboto',sans-serif;}select option{background:#0a1240;color:#fff;}<\/style>\n<\/head>\n<body>\n  <div id="root"><\/div>\n  <script>window.__INITIAL_DATA__=${json};<\/script>\n  <script>window.__EXTRA_FIELDS__=${efJson};<\/script>\n  <script>window.__NODE_TYPE_CONFIG__=${ntJson};<\/script>\n  <script type="text/babel">${scriptSrc}<\/script>\n<\/body>\n<\/html>`;
      }
      function handleExport(){
        const html=buildHTML();
        const blob=new Blob([html],{type:"text/html"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");
        a.href=url;a.download="definian-ai-map.html";a.click();
        URL.revokeObjectURL(url);
        setExported(true);setTimeout(()=>setExported(false),2500);
      }
      async function handlePush(){
        const token=localStorage.getItem('def-ai-map-pat');
        if(!token){addLog("No PAT found — open settings to add a token","error");setShowSettings(true);return;}
        setPushState("pushing");
        addLog("Push started","info");
        try{
          const html=buildHTML();
          addLog(`Built HTML (${(html.length/1024).toFixed(1)} KB)`,"info");
          const owner="PremierInternational",repo="definian-ai-map",path="definian-ai-map.html";
          addLog(`GET /repos/${owner}/${repo}/contents/${path} (fetching current SHA)`,"info");
          const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json"}});
          addLog(`Response: HTTP ${r.status}`,r.ok?"info":"error");
          if(!r.ok)throw new Error(`GitHub API error ${r.status}`);
          const{sha}=await r.json();
          addLog(`Current file SHA: ${sha.slice(0,7)}`,"info");
          const b64=btoa(unescape(encodeURIComponent(html)));
          addLog(`PUT /repos/${owner}/${repo}/contents/${path}`,"info");
          const p=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{method:"PUT",headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify({message:"Update AI Integration Map",content:b64,sha})});
          addLog(`Response: HTTP ${p.status}`,p.ok?"info":"error");
          if(!p.ok){const t=await p.text();throw new Error(`Push failed ${p.status}: ${t}`);}
          const{commit}=await p.json();
          addLog(`Committed: ${commit.sha.slice(0,7)} — "${commit.message}"`,"success");
          setPushState("success");setTimeout(()=>setPushState("idle"),3000);
        }catch(err){
          addLog(`Error: ${err.message}`,"error");
          setPushState("error");setPushError(err.message);setTimeout(()=>{setPushState("idle");setPushError("");},6000);
        }
      }
      function savePat(){localStorage.setItem('def-ai-map-pat',pat);addLog("PAT saved to localStorage","info");setShowSettings(false);}
      async function handleRefresh(){
        setRefreshState("refreshing");
        addLog("Refresh started","info");
        try{
          const owner="PremierInternational",repo="definian-ai-map",path="definian-ai-map.html";
          const token=localStorage.getItem('def-ai-map-pat');
          const headers={Accept:"application/vnd.github+json"};
          if(token){headers.Authorization=`Bearer ${token}`;addLog("Using stored PAT for auth","info");}
          else{addLog("No PAT found — using unauthenticated request","info");}
          addLog(`GET /repos/${owner}/${repo}/contents/${path}`,"info");
          const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{headers});
          addLog(`Response: HTTP ${r.status}`,r.ok?"info":"error");
          if(!r.ok)throw new Error(`GitHub API error ${r.status}`);
          const{content,sha}=await r.json();
          addLog(`Got file (SHA: ${sha.slice(0,7)})`,"info");
          const html=decodeURIComponent(escape(atob(content.replace(/\n/g,""))));
          const match=html.match(/window\.__INITIAL_DATA__\s*=\s*([\s\S]*?);\s*<\/script>/);
          if(!match)throw new Error("Could not parse __INITIAL_DATA__ from remote file");
          const fresh=JSON.parse(match[1]);
          const nodeCount=getAllNodes(fresh).length;
          addLog(`Parsed ${nodeCount} nodes from remote file`,"success");
          setData(fresh);
          addLog("Data updated — localStorage synced","success");
          setRefreshState("success");setTimeout(()=>setRefreshState("idle"),3000);
        }catch(err){
          addLog(`Error: ${err.message}`,"error");
          setRefreshState("error");setTimeout(()=>setRefreshState("idle"),4000);
        }
      }

      const selStyle={background:"#0a1240",border:"1px solid #3C405B",color:"#FFFFFF",borderRadius:7,padding:"6px 12px",fontSize:12,cursor:"pointer"};

      return(
        <div style={{fontFamily:"Roboto,sans-serif",background:BRAND.midnight,minHeight:"100vh",padding:28}}>
          {showEmbed&&<EmbedModal onClose={()=>setShowEmbed(false)}/>}
          <div style={{maxWidth:900,margin:"0 auto"}}>

            {/* Header */}
            <div style={{display:"flex",alignItems:"center",gap:20,marginBottom:6}}>
              <svg width="58" height="64" viewBox="0 0 900 1000" fill="none" xmlns="http://www.w3.org/2000/svg" style={{flexShrink:0}}>
                <defs><linearGradient id="cg" x1="0" y1="0" x2="900" y2="1000" gradientUnits="userSpaceOnUse"><stop offset="0%" stopColor="#00AB63"/><stop offset="100%" stopColor="#0D2C71"/></linearGradient></defs>
                <polygon points="450,60 820,260 450,460 80,260" fill="#00AB63"/>
                <polygon points="80,260 80,680 450,880 450,460" fill="url(#cg)"/>
                <polygon points="820,260 820,680 450,880 450,460" fill="#0D2C71"/>
                <polygon points="450,140 620,230 450,320 280,230" fill="white"/>
                <path d="M450 195 L465 220 L490 220 L470 238 L478 265 L450 248 L422 265 L430 238 L410 220 L435 220 Z" fill="#00AB63"/>
                <g stroke="#D8D7EE" strokeWidth="8" fill="none" opacity="0.5">
                  <polyline points="200,480 160,540 120,540 120,600"/><circle cx="120" cy="610" r="14" fill="#D8D7EE"/>
                  <polyline points="200,520 170,580 170,640"/><circle cx="170" cy="652" r="14" fill="#D8D7EE"/>
                  <polyline points="300,540 260,600 220,600 220,660"/><circle cx="220" cy="672" r="14" fill="#D8D7EE"/>
                  <polyline points="350,600 310,660 310,720"/><circle cx="310" cy="732" r="14" fill="#D8D7EE"/>
                </g>
                <g stroke="#D8D7EE" strokeWidth="8" fill="none" opacity="0.4">
                  <polyline points="700,480 740,540 780,540 780,600"/><circle cx="780" cy="610" r="14" fill="#D8D7EE"/>
                  <polyline points="680,520 720,580 720,640"/><circle cx="720" cy="652" r="14" fill="#D8D7EE"/>
                  <polyline points="600,540 640,600 680,600 680,660"/><circle cx="680" cy="672" r="14" fill="#D8D7EE"/>
                  <polyline points="560,580 600,640 560,700"/><circle cx="560" cy="712" r="14" fill="#D8D7EE"/>
                </g>
              </svg>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Titillium Web',sans-serif",fontWeight:700,fontSize:38,color:BRAND.white,lineHeight:1.1,letterSpacing:"-0.5px"}}>
                  Data Platform <span style={{color:BRAND.green}}>·</span> AI Integration Map
                </div>
              </div>
              <div style={{display:"flex",gap:8,flexShrink:0,alignItems:"center"}}>
                <button onClick={handleRefresh} disabled={refreshState==="refreshing"} title="Pull latest data from GitHub"

                    color:refreshState==="success"?"#00AB63":refreshState==="error"?"#f87171":"#8B9CBD",
                    borderRadius:8,padding:"8px 12px",fontSize:13,cursor:refreshState==="refreshing"?"wait":"pointer",
                    transition:"all 0.2s",lineHeight:1,opacity:refreshState==="refreshing"?0.6:1}}>
                  {refreshState==="refreshing"?"⏳":refreshState==="success"?"✓":"↻"}
                </button>
                <button onClick={()=>setShowEmbed(e=>!e)}
                  style={{background:"transparent",border:`1.5px solid #4a90d9`,
                    color:"#4a90d9",borderRadius:8,padding:"8px 16px",
                    fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",
                    gap:6,transition:"all 0.2s",whiteSpace:"nowrap"}}>
                  ⧉ Embed Code
                </button>
                <button onClick={handleExport}
                  style={{background:exported?"#1e2240":"transparent",border:`1.5px solid #3C405B`,
                    color:exported?"#D8D7EE":"#8B9CBD",borderRadius:8,padding:"8px 16px",
                    fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",
                    gap:6,transition:"all 0.2s",whiteSpace:"nowrap"}}>
                  {exported?"✓ Downloaded!":"⬇ Export HTML"}
                </button>
                <button onClick={()=>setShowSettings(s=>!s)} title="GitHub Settings"
                  style={{background:showSettings?"#1a2d4f":"transparent",border:`1.5px solid #3C405B`,
                    color:"#8B9CBD",borderRadius:8,padding:"8px 10px",fontSize:14,cursor:"pointer",
                    transition:"all 0.2s",lineHeight:1}}>
                  ⚙
                </button>
                <button onClick={handlePush} disabled={pushState==="pushing"}
                  style={{background:pushState==="success"?BRAND.green:pushState==="error"?"#7f1d1d":BRAND.green,
                    border:`1.5px solid ${pushState==="error"?"#ef4444":BRAND.green}`,
                    color:pushState==="error"?"#fca5a5":BRAND.midnight,borderRadius:8,padding:"8px 16px",
                    fontSize:12,fontWeight:700,cursor:pushState==="pushing"?"wait":"pointer",
                    display:"flex",alignItems:"center",gap:6,transition:"all 0.2s",whiteSpace:"nowrap",
                    opacity:pushState==="pushing"?0.7:1}}>
                  {pushState==="pushing"?"⏳ Pushing...":pushState==="success"?"✓ Pushed!":pushState==="error"?"✗ Failed":"⬆ Save & Push"}
                </button>
              </div>
            </div>

            {/* GitHub Settings Panel */}
            {showSettings&&(
              <div style={{background:"#0a1240",border:"1px solid #3C405B",borderRadius:8,padding:"14px 18px",marginTop:10,marginBottom:6}}>
                <div style={{fontSize:11,color:BRAND.green,fontFamily:"'Titillium Web',sans-serif",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>GitHub Settings</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:10,alignItems:"flex-end"}}>
                  <label style={{display:"flex",flexDirection:"column",gap:4,fontSize:11,color:"#D8D7EE"}}>
                    <span style={{textTransform:"uppercase",letterSpacing:"0.06em",fontSize:10,color:"#8B9CBD"}}>Personal Access Token (repo write scope)</span>
                    <input type="password" value={pat} onChange={e=>setPat(e.target.value)} placeholder="ghp_..." style={{background:"#02072D",border:"1px solid #3C405B",borderRadius:6,padding:"6px 10px",fontSize:12,color:"#FFFFFF",outline:"none",width:300,fontFamily:"monospace"}}/>
                  </label>
                  <button onClick={savePat} style={{background:BRAND.green,border:"none",borderRadius:7,padding:"7px 16px",fontSize:12,fontWeight:700,color:BRAND.midnight,cursor:"pointer"}}>Save Token</button>
                  {localStorage.getItem('def-ai-map-pat')&&<button onClick={()=>{localStorage.removeItem('def-ai-map-pat');setPat('');}} style={{background:"transparent",border:"1px solid #7f1d1d",borderRadius:7,padding:"7px 14px",fontSize:12,color:"#f87171",cursor:"pointer"}}>Clear Token</button>}
                </div>
                {pushError&&<div style={{fontSize:11,color:"#f87171",marginTop:10,fontFamily:"monospace",wordBreak:"break-all"}}>{pushError}</div>}
                <div style={{fontSize:10,color:"#4B5A72",marginTop:8}}>Token is stored in your browser only and never committed to the repo.</div>
                {logs.length>0&&(
                  <div style={{marginTop:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <span style={{fontSize:10,color:"#8B9CBD",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>Activity Log</span>
                      <button onClick={()=>setLogs([])} style={{background:"none",border:"none",color:"#4B5A72",fontSize:10,cursor:"pointer",padding:"0 2px"}}>Clear</button>
                    </div>
                    <div style={{background:"#02072D",border:"1px solid #1e2240",borderRadius:6,padding:"8px 10px",maxHeight:180,overflowY:"auto",fontFamily:"monospace",fontSize:11,display:"flex",flexDirection:"column",gap:3}}>
                      {logs.map((l,i)=>(
                        <div key={i} style={{display:"flex",gap:10,color:l.level==="error"?"#f87171":l.level==="success"?"#00AB63":"#8B9CBD"}}>
                          <span style={{color:"#4B5A72",flexShrink:0}}>{l.t}</span>
                          <span>{l.msg}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Divider */}
            <div style={{height:2,background:"linear-gradient(90deg,#00AB63,#0D2C7133)",borderRadius:2,marginBottom:20}}/>

            {/* Summary + Filters */}
            <div style={{display:"flex",flexWrap:"wrap",gap:10,alignItems:"center",marginBottom:20}}>
              {Object.entries(STATUS_CONFIG).map(([s,c])=>(
                <div key={s} style={{background:c.bg,color:c.text,border:`1px solid ${c.border}44`,borderRadius:8,padding:"5px 14px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:c.dot}}/>{counts[s]} {s}
                </div>
              ))}
              {Object.entries(NODE_TYPE_CONFIG).map(([t,cfg])=>typeCounts[t]?(
                <div key={t} style={{background:`${cfg.color}15`,color:cfg.color,border:`1px solid ${cfg.color}44`,borderRadius:8,padding:"5px 14px",fontSize:12,fontWeight:600}}>
                  {cfg.icon} {typeCounts[t]} {t}{typeCounts[t]!==1?"s":""}
                </div>
              ):null)}
              <div style={{flex:1}}/>
              <select style={selStyle} value={filters.nodeType} onChange={e=>setFilters(f=>({...f,nodeType:e.target.value}))}>
                <option value="">All Types</option>
                {Object.keys(NODE_TYPE_CONFIG).map(t=><option key={t}>{t}</option>)}
              </select>
              <select style={selStyle} value={filters.status} onChange={e=>setFilters(f=>({...f,status:e.target.value}))}>
                <option value="">All Statuses</option>
                {Object.keys(STATUS_CONFIG).map(s=><option key={s}>{s}</option>)}
              </select>
              <select style={selStyle} value={filters.owner} onChange={e=>setFilters(f=>({...f,owner:e.target.value}))}>
                <option value="">All Owners</option>
                {owners.map(o=><option key={o}>{o}</option>)}
              </select>
              <select style={selStyle} value={filters.buildType} onChange={e=>setFilters(f=>({...f,buildType:e.target.value}))}>
                <option value="">All Build Types</option>
                {Object.keys(BUILD_CONFIG).filter(b=>b!=="\u2014").map(b=><option key={b}>{b}</option>)}
              </select>
              {anyFilter&&(
                <button onClick={()=>setFilters({status:"",owner:"",buildType:"",nodeType:""})}
                  style={{background:"none",border:"1px solid #3C405B",borderRadius:7,padding:"6px 12px",color:"#D8D7EE",fontSize:12,cursor:"pointer"}}>
                  ✕ Clear
                </button>
              )}
            </div>

            <NodeCard node={data} depth={0} filters={filters} onEdit={handleEdit} onDelete={handleDelete} onAddChild={handleAddChild} onMove={handleMove} siblingIndex={0} siblingCount={1} isRoot={true}/>

            {/* Legend */}
            <div style={{marginTop:22,display:"flex",gap:18,flexWrap:"wrap",fontSize:11,color:BRAND.coolGray,justifyContent:"center",borderTop:"1px solid #1e2240",paddingTop:14}}>
              <span style={{color:"#4a5068",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",fontSize:10}}>Node Types</span>
              {Object.entries(NODE_TYPE_CONFIG).map(([k,v])=>(
                <span key={k} style={{color:v.color,fontWeight:600}}>{v.icon} {k}</span>
              ))}
              <span style={{color:"#4a5068",margin:"0 4px"}}>·</span>
              <span style={{color:"#4a5068",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",fontSize:10}}>Build Types</span>
              {Object.entries(BUILD_CONFIG).filter(([k])=>k!=="\u2014").map(([k,v])=>(
                <span key={k} style={{color:v.color}}>{v.icon} {k}</span>
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
